<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>

<body>
    <div style="display: flex; justify-content: space-between; padding: 0px 100px;">
        <div id="notes">
            Loading.....
        </div>
        <div>
            <input type="text" id="userNote">
            <button onclick="addTodo()">Create new note</button>
        </div>

    </div>

    <script>

        function addTodo() {
            const noteValue = document.getElementById("userNote").value;

            axios.post("http://localhost:3000/notes", {
                note: noteValue
            });

            // show todo instantly (optional UI update)
            const newNode = document.createElement("div");
            newNode.innerHTML = noteValue;
            newNode.setAttribute("style", "border:2px solid black; padding:10px;");

            document.getElementById("notes").appendChild(newNode);

            // clear input
            document.getElementById("userNote").value = "";
        }


        async function getTodos() {
            const response = await axios.get("http://localhost:3000/notes");

            const notes = response.data.notes;

            document.getElementById("notes").innerHTML = "";

            for (let i = 0; i < notes.length; i++) {
                const noteNode = document.createElement("div");
                noteNode.innerHTML = notes[i];
                noteNode.setAttribute("style", "border:2px solid black; padding:10px;");

                document.getElementById("notes").appendChild(noteNode);
            }
        }

        getTodos();
    </script>

</body>

</html>
